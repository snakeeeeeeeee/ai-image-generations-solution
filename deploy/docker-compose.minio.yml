services:
  image-api:
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      R2_ENDPOINT: http://minio:9000
      R2_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      R2_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      R2_BUCKET: ${MINIO_BUCKET:-image-handle}
      R2_PUBLIC_URL: http://localhost:${MINIO_HOST_PORT:-9000}/${MINIO_BUCKET:-image-handle}
      R2_FORCE_PATH_STYLE: "true"

  image-worker:
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      R2_ENDPOINT: http://minio:9000
      R2_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      R2_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      R2_BUCKET: ${MINIO_BUCKET:-image-handle}
      R2_PUBLIC_URL: http://localhost:${MINIO_HOST_PORT:-9000}/${MINIO_BUCKET:-image-handle}
      R2_FORCE_PATH_STYLE: "true"

  image-notifier:
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      R2_ENDPOINT: http://minio:9000
      R2_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      R2_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      R2_BUCKET: ${MINIO_BUCKET:-image-handle}
      R2_PUBLIC_URL: http://localhost:${MINIO_HOST_PORT:-9000}/${MINIO_BUCKET:-image-handle}
      R2_FORCE_PATH_STYLE: "true"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    profiles: ["minio"]
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - image-handle-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - default
      - image-handle-gateway

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    profiles: ["minio"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" &&
        mc mb --ignore-existing "local/$${MINIO_BUCKET}" &&
        mc anonymous set download "local/$${MINIO_BUCKET}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-image-handle}
    networks:
      - default
      - image-handle-gateway

volumes:
  image-handle-minio-data:
