server {
    listen 443 ssl http2;
    server_name api.example.com;

    client_max_body_size 100m;

    location = /image-wrapper-healthz {
        proxy_pass http://127.0.0.1:28787/healthz;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /image-wrapper/admin {
        proxy_pass http://127.0.0.1:28787;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }

    location = /image-wrapper/v1/images/generations {
        proxy_pass http://127.0.0.1:28787/v1/images/generations;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_connect_timeout 30s;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
    }

    location = /image-wrapper/v1/images/edits {
        proxy_pass http://127.0.0.1:28787/v1/images/edits;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_connect_timeout 30s;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
    }
}
